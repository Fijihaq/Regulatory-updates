<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Regulatory Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e13;
      --surface:   #111520;
      --border:    #1e2535;
      --accent:    #00d4ff;
      --accent2:   #ff6b35;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --tag-bg:    #1a2235;
      --pulse:     #00d4ff;
      --font-head: 'Syne', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Widget Container ── */
    .reg-widget {
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .reg-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .reg-title-group {}

    .reg-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--pulse);
      animation: pulse-dot 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(0,212,255,0.5); }
      50% { opacity: 0.7; transform: scale(1.15); box-shadow: 0 0 0 5px rgba(0,212,255,0); }
    }

    .reg-title {
      font-family: var(--font-head);
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #fff;
    }

    .reg-meta {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* ── Feed List ── */
    .reg-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .reg-item {
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem 1rem;
      align-items: start;
      transition: background 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      animation: slide-in 0.4s ease both;
    }

    .reg-item:hover .item-title {
      color: var(--accent);
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-left {}

    .item-source-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .item-flag {
      font-size: 0.9rem;
      line-height: 1;
    }

    .item-source {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .item-title {
      font-family: var(--font-head);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      transition: color 0.2s;
    }

    .item-summary {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.3rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-right {
      text-align: right;
      flex-shrink: 0;
    }

    .item-date {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .item-arrow {
      font-size: 0.75rem;
      color: var(--border);
      margin-top: 0.35rem;
      display: block;
      transition: color 0.2s, transform 0.2s;
    }

    .reg-item:hover .item-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* ── Empty / Loading / Error ── */
    .reg-status {
      padding: 3rem 0;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .reg-status .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .reg-footer {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .reg-count {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
    }

    .reg-refresh {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 0.25rem 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reg-refresh:hover {
      background: var(--accent);
      color: #000;
    }

    /* ── Scanline decoration ── */
    .reg-widget::before {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
      margin-bottom: 2rem;
      border-radius: 1px;
    }
  </style>
</head>
<body>

<section class="reg-widget" id="regulatoryWidget">
  <!-- Header -->
  <header class="reg-header">
    <div class="reg-title-group">
      <div class="reg-eyebrow">
        <span class="live-dot"></span>
        Live Feed
      </div>
      <h2 class="reg-title">Regulatory Intelligence</h2>
      <p class="reg-meta" id="lastUpdated">Fetching latest updates…</p>
    </div>
  </header>

  <!-- Filters: Category row then Source row -->
  <div style="margin-bottom:0.4rem;">
    <div class="filter-bar" id="filterCategory">
      <button class="filter-btn active" data-cat="ALL">All Categories</button>
      <button class="filter-btn" data-cat="Regulator">🏛 Regulators</button>
      <button class="filter-btn" data-cat="Sanctions">🚫 Sanctions</button>
      <button class="filter-btn" data-cat="News">📰 News</button>
    </div>
    <div class="filter-bar" id="filterSource" style="margin-top:0.4rem;"></div>
  </div>

  <!-- Feed -->
  <div class="reg-list" id="regList">
    <div class="reg-status">
      <div class="spinner"></div><br/>Loading regulatory updates…
    </div>
  </div>

  <!-- Footer -->
  <footer class="reg-footer">
    <span class="reg-count" id="regCount"></span>
    <button class="reg-refresh" id="refreshBtn">↺ Refresh</button>
  </footer>
</section>

<script>
  // ─────────────────────────────────────────────────────────────────
  // CONFIGURATION — update these two lines for your GitHub repo
  // ─────────────────────────────────────────────────────────────────
  const GITHUB_USER = 'Fijihaq';
  const GITHUB_REPO = 'Regulatory-updates';
  // Path inside the repo where the JSON is saved
  const DATA_PATH   = 'data/regulatory-updates.json';
  // ─────────────────────────────────────────────────────────────────

  const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${DATA_PATH}`;

  let allItems      = [];
  let activeCat     = 'ALL';
  let activeSource  = 'ALL';

  // ── Fetch ────────────────────────────────────────────────────────
  async function loadFeed() {
    const list = document.getElementById('regList');
    list.innerHTML = `<div class="reg-status"><div class="spinner"></div><br/>Loading…</div>`;

    try {
      const res  = await fetch(`${RAW_URL}?t=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      allItems = data.items || [];
      document.getElementById('lastUpdated').textContent = `Last updated: ${data.last_updated}`;
      buildCategoryFilters();
      buildSourceFilters();
      renderList();
    } catch (err) {
      list.innerHTML = `<div class="reg-status">⚠ Could not load feed.<br/>${err.message}</div>`;
      console.error(err);
    }
  }

  // ── Category filter buttons (static) ─────────────────────────────
  function buildCategoryFilters() {
    document.querySelectorAll('#filterCategory .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCat    = btn.dataset.cat;
        activeSource = 'ALL';
        document.querySelectorAll('#filterCategory .filter-btn')
          .forEach(b => b.classList.toggle('active', b.dataset.cat === activeCat));
        buildSourceFilters();
        renderList();
      });
    });
  }

  // ── Source filter buttons (dynamic per category) ──────────────────
  function buildSourceFilters() {
    const bar = document.getElementById('filterSource');
    const catItems = activeCat === 'ALL'
      ? allItems
      : allItems.filter(i => i.category === activeCat);

    const sources = ['ALL', ...new Set(catItems.map(i => i.source))];
    bar.innerHTML = '';
    sources.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (s === activeSource ? ' active' : '');
      btn.dataset.src = s;
      const item = allItems.find(i => i.source === s);
      btn.textContent = s === 'ALL' ? 'All Sources' : `${item?.flag ?? ''} ${s}`;
      btn.addEventListener('click', () => {
        activeSource = s;
        document.querySelectorAll('#filterSource .filter-btn')
          .forEach(b => b.classList.toggle('active', b.dataset.src === s));
        renderList();
      });
      bar.appendChild(btn);
    });
  }

  // ── Render ───────────────────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('regList');
    let visible = allItems;
    if (activeCat    !== 'ALL') visible = visible.filter(i => i.category === activeCat);
    if (activeSource !== 'ALL') visible = visible.filter(i => i.source   === activeSource);

    document.getElementById('regCount').textContent =
      `${visible.length} update${visible.length !== 1 ? 's' : ''} shown`;

    if (!visible.length) {
      list.innerHTML = `<div class="reg-status">No updates found.</div>`;
      return;
    }

    // Category badge colours
    const catColour = { Regulator: '#00d4ff', Sanctions: '#ff6b35', News: '#a78bfa' };

    list.innerHTML = '';
    visible.forEach((item, idx) => {
      const a = document.createElement('a');
      a.className   = 'reg-item';
      a.href        = item.link || '#';
      a.target      = '_blank';
      a.rel         = 'noopener noreferrer';
      a.style.animationDelay = `${idx * 40}ms`;

      const dateStr = item.date
        ? new Date(item.date).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
        : '';

      const cat = item.category || 'Regulator';
      const catColor = catColour[cat] || '#64748b';
      const catBadge = `<span style="
        font-family:var(--font-mono);font-size:0.58rem;letter-spacing:0.07em;
        padding:0.1rem 0.45rem;border-radius:3px;border:1px solid ${catColor}33;
        color:${catColor};background:${catColor}15;text-transform:uppercase;margin-left:0.4rem;
      ">${escHtml(cat)}</span>`;

      a.innerHTML = `
        <div class="item-left">
          <div class="item-source-row">
            <span class="item-flag">${item.flag ?? ''}</span>
            <span class="item-source">${escHtml(item.source)}</span>
            ${catBadge}
          </div>
          <div class="item-title">${escHtml(item.title)}</div>
          ${item.summary ? `<div class="item-summary">${escHtml(item.summary)}</div>` : ''}
        </div>
        <div class="item-right">
          <div class="item-date">${dateStr}</div>
          <span class="item-arrow">→</span>
        </div>`;
      list.appendChild(a);
    });
  }

  // ── Utils ────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('refreshBtn').addEventListener('click', loadFeed);

  // Auto-refresh every 5 minutes
  loadFeed();
  setInterval(loadFeed, 5 * 60 * 1000);
</script>
</body>
</html>
